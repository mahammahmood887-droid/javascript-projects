<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Quiz</title>
  <style>
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #fff5e6;
      color: #4a2c0f;

      display: flex;
      justify-content: center;
      margin-top: 60px;
    }

    main {
      width: 420px;
    }

    h1 {
      color: #d35400;
      border-bottom: 3px solid #e67e22;
      padding-bottom: 6px;
    }

    #question {
      font-size: 19px;
      margin-bottom: 16px;
      font-weight: bold;
    }

    .option {
      display: block;
      width: 100%;
      text-align: left;
      padding: 12px;
      margin-bottom: 8px;
      border: 2px solid #e67e22;
      border-radius: 0;
      background: #fff;
      color: #4a2c0f;
      cursor: pointer;
      font-size: 15px;
      font-family: inherit;
    }

    .option:hover {
      background: #fdebd0;
    }

    .option.correct {
      background: #d4efdf;
      border-color: #27ae60;
    }

    .option.wrong {
      background: #fadbd8;
      border-color: #c0392b;
    }

    #next-btn {
      margin-top: 12px;
      padding: 10px 18px;
      border: none;
      border-radius: 0;
      background: #d35400;
      color: white;
      cursor: pointer;
      display: none;
      font-family: inherit;
      font-size: 14px;
    }

    #next-btn:hover {
      background: #a04000;
    }

    #progress {
      color: #a0522d;
      font-size: 14px;
      margin-bottom: 4px;
    }

    #result {
      font-size: 22px;
      text-align: center;
    }

    #restart-btn {
      border: none;
      border-radius: 0;
      background: #d35400;
      color: white;
      padding: 10px 18px;
      cursor: pointer;
      font-family: inherit;
    }
  </style>
</head>

<body>
  <main>
    <h1>Quiz</h1>
    <div id="quiz-app"></div>
  </main>
  <script>

    const questions = [
      {
        question: 'Which keyword declares a block-scoped variable?',
        options: ['var', 'let', 'function', 'global'],
        answerIndex: 1,
      },
      {
        question: 'What does DOM stand for?',
        options: [
          'Document Object Model',
          'Data Object Method',
          'Display Output Module',
          'Document Order Map',
        ],
        answerIndex: 0,
      },
      {
        question: 'Which one is NOT a JavaScript primitive type?',
        options: ['string', 'boolean', 'object', 'number'],
        answerIndex: 2,
      },
      {
        question: 'What does a Promise represent?',
        options: [
          'A guaranteed synchronous result',
          'A value that will be available now, later, or never (resolved/rejected)',
          'A type of array',
          'A CSS animation',
        ],
        answerIndex: 1,
      },
    ];

    const app = document.getElementById('quiz-app');

    let currentIndex = 0;
    let score = 0;
    let answered = false;

    function renderQuestion() {
      const q = questions[currentIndex];
      answered = false;


      let optionsHTML = '';
      for (let i = 0; i < q.options.length; i++) {
        optionsHTML += '<button class="option" onclick="selectOption(' + i + ')">' + q.options[i] + '</button>';
      }

      app.innerHTML =
        '<div id="progress">Question ' + (currentIndex + 1) + ' of ' + questions.length + ' — Score: ' + score + '</div>' +
        '<div id="question">' + q.question + '</div>' +
        '<div id="options">' + optionsHTML + '</div>' +
        '<button id="next-btn" onclick="nextQuestion()">Next</button>';
    }

    function selectOption(index) {
      if (answered) return; 
      answered = true;

      const q = questions[currentIndex];
      const optionButtons = document.querySelectorAll('#options .option');

      // Mark the correct answer
      optionButtons[q.answerIndex].classList.add('correct');

      if (index === q.answerIndex) {
        score += 1;
      } else {
        optionButtons[index].classList.add('wrong');
      }

      document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQuestion() {
      currentIndex += 1;
      if (currentIndex < questions.length) {
        renderQuestion();
      } else {
        renderResult();
      }
    }

    function renderResult() {
      app.innerHTML =
        '<div id="result">' +
        'You scored ' + score + ' / ' + questions.length + '!<br/>' +
        '<button id="restart-btn" onclick="restartQuiz()">Restart</button>' +
        '</div>';
    }

    function restartQuiz() {
      currentIndex = 0;
      score = 0;
      answered = false;
      renderQuestion();
    }

    renderQuestion();
  </script>
</body>

</html>
