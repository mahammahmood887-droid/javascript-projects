
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Word Counter</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: #fffdf5;
    font-family: 'Patrick Hand', 'Comic Sans MS', cursive, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }
  h1 { color: #4a4a4a; }
  h2 { color: #4a4a4a; margin-top: 40px; }
  textarea {
    width: 100%;
    max-width: 600px;
    height: 220px;
    padding: 16px;
    font-size: 16px;
    border-radius: 6px;
    border: 1px solid #e0d9c3;
    background: repeating-linear-gradient(#fffdf5, #fffdf5 27px, #e8e2cf 28px);
    line-height: 28px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    resize: vertical;
  }
  .stats {
    margin-top: 18px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .stat {
    background: #fef3c7;
    border: 1px solid #f2dca0;
    padding: 10px 18px;
    border-radius: 10px;
    text-align: center;
    min-width: 90px;
  }
  .stat .num { font-size: 22px; font-weight: bold; color: #b5872c; }
  .stat .label { font-size: 12px; color: #7a6a3f; }

  button {
    font-family: inherit;
    font-size: 16px;
    padding: 10px 18px;
    border-radius: 8px;
    border: 1px solid #f2dca0;
    background: #fef3c7;
    color: #7a6a3f;
    cursor: pointer;
    margin: 6px;
  }
  button:hover { background: #f2dca0; }

  .status {
    margin-top: 10px;
    color: #7a6a3f;
    font-size: 14px;
  }
</style>
</head>
<body>

<h1>Word & Character Counter</h1>
<textarea id="textBox" placeholder="Start typing here..."></textarea>

<div class="stats">
  <div class="stat"><div class="num" id="wordCount">0</div><div class="label">Words</div></div>
  <div class="stat"><div class="num" id="charCount">0</div><div class="label">Characters</div></div>
  <div class="stat"><div class="num" id="sentenceCount">0</div><div class="label">Sentences</div></div>
  <div class="stat"><div class="num" id="readTime">0s</div><div class="label">Read Time</div></div>
</div>

<h2>Analyze Text</h2>
<button id="analyzeBtn">Analyze Text</button>
<div class="status" id="analyzeStatus">Click the button to analyze the text above.</div>

<script>
  const textBox = document.getElementById('textBox');
  const wordCountEl = document.getElementById('wordCount');
  const charCountEl = document.getElementById('charCount');
  const sentenceCountEl = document.getElementById('sentenceCount');
  const readTimeEl = document.getElementById('readTime');
  updateStats();

  function updateStats() {
    const text = textBox.value;

    const words = countWords(text);
    const chars = text.length;
    const sentences = countSentences(text);
    const seconds = estimateReadTime(words);

    wordCountEl.textContent = words;
    charCountEl.textContent = chars;
    sentenceCountEl.textContent = sentences;
    readTimeEl.textContent = `${seconds}s`;
  }

  function countWords(text) {
    const trimmed = text.trim();
    if (trimmed === '') return 0;
    return trimmed.split(/\s+/).length;
  }

  function countSentences(text) {
    const matches = text.match(/[.!?]+/g);
    return matches ? matches.length : 0;
  }

  function estimateReadTime(wordCount) {
    const wordsPerSecond = 200 / 60;
    return Math.ceil(wordCount / wordsPerSecond);
  }

  textBox.addEventListener('input', updateStats);

  const analyzeBtn = document.getElementById('analyzeBtn');
  const analyzeStatus = document.getElementById('analyzeStatus');

  function fakeAnalyze(text) {
    return new Promise(function (resolve) {
      setTimeout(function () {
        resolve(countWords(text));
      }, 1000);
    });
  }

  async function handleAnalyzeClick() {
    analyzeStatus.textContent = 'Analyzing...';
    const wordCount = await fakeAnalyze(textBox.value);
    analyzeStatus.textContent = `Done! Your text has ${wordCount} word(s).`;
  }

  analyzeBtn.addEventListener('click', handleAnalyzeClick);
</script>
</body>
</html>
